name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }} ${{ matrix.goarch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-24.04-arm
          - goos: darwin
            goarch: amd64
            runner: macos-13
          - goos: darwin
            goarch: arm64
            runner: macos-latest
          - goos: windows
            goarch: amd64
            runner: windows-latest
    runs-on: ${{ matrix.runner }}
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      CGO_ENABLED: "1"
      PLUGIN_REPOSITORY: https://github.com/zhumengling/codex-token-usage
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - name: Install Windows C compiler
        if: matrix.goos == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            zip

      - name: Add MSYS2 to PATH
        if: matrix.goos == 'windows'
        shell: pwsh
        run: echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Test
        run: go test ./...

      - name: Package
        shell: bash
        run: bash ./package-release.sh dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cpa-plugin-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.zip
            dist/checksums.txt

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Merge checksums
        run: |
          find artifacts -name '*.zip' -exec cp {} . \;
          find artifacts -name checksums.txt -print0 | xargs -0 cat > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.zip
            checksums.txt
